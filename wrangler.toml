name = "cloud-mail3"
main = "mail-worker/src/index.js"
compatibility_date = "2025-06-04"

[observability]
enabled = true

[ai]
binding = "ai"

[assets]
binding = "assets"
directory = "./mail-worker/dist"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "db"
database_name = "cloud-mail-db"
database_id = "a614946e-cf7c-4333-86a0-b7b9bc7e9704"

[[kv_namespaces]]
binding = "kv"
id = "3d8c1b80bc50414fa19d5973365dbc8e"

[vars]
jwt_secret = "luchu-cloudmail-2024-secure-init-key-7x9k2"
admin = "ashton@luchuenergy.com"
domain = "[\"luchuenergy.com\"]"

[triggers]
crons = ["0 16 * * *"]

[build]
command = "npm --prefix ./mail-vue install --legacy-peer-deps && npm --prefix ./mail-worker install --legacy-peer-deps && npm --prefix ./mail-vue run build"
